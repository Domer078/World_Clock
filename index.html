<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select id="city">
        <option value="">Choose a City</option>
        <option value="Europe/Paris">Paris</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Europe/London">London</option>
      </select>
      <div id="cities">
        <div class="city" id="Los-Angeles">
          <div>
            <h2>Los Angeles</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="Monaco">
          <div>
            <h2>Monaco</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>

    <footer>
      This project was coded with❤️by<a
        href="https://github.com/Domer078"
        target="_blank"
        >Khomotso Mabala</a
      >,is
      <a href="https://github.com/Domer078/World_Clock" target="_blank"
        >open-sourced on Github</a
      >
      and hosted on
      <a href="https://worldclockhub.netlify.app/" target="_blank">Netlify</a>
    </footer>

    <script src="Javascript/index.js"></script>
  </body>
</html>
